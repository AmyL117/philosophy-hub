<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0; url=https://philosophy-hub.lovable.app" />
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/philosophy-hub/, "") || "/";
        var target = "https://philosophy-hub.lovable.app" + path + window.location.search + window.location.hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
